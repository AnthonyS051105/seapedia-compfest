services:
  - type: web
    name: seapedia-backend
    runtime: node
    plan: free
    rootDir: apps/backend
    buildCommand: npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: BCRYPT_ROUNDS
        value: 12
